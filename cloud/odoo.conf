[options]
; Odoo Community configuration for Azure VM

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = ${ODOO_DB_PASSWORD}
db_name = odoo

; Performance (tuned for B1s 1GB RAM)
workers = 2
max_cron_threads = 1
limit_memory_hard = 786432000
limit_memory_soft = 629145600
limit_request = 8192
limit_time_cpu = 120
limit_time_real = 240

; Logging
logfile = /var/lib/odoo/odoo.log
log_level = warn
log_db = False

; Security
admin_passwd = ${ODOO_ADMIN_PASSWORD}
list_db = False
proxy_mode = True
