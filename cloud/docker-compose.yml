version: "3.8"

# Cloud Odoo Stack — Azure B1s VM
# Includes: Odoo Community + PostgreSQL + Nginx (HTTPS via Let's Encrypt)
# Run with: docker compose up -d
# HTTPS setup: run ./certbot-init.sh after first deploy

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: odoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo_secure_password}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo_net

  # ── Odoo Community ────────────────────────────────────────────────────
  odoo:
    image: odoo:17
    container_name: odoo_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo_secure_password}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    # Odoo only exposed to Nginx (not public)
    expose:
      - "8069"
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: odoo_nginx
    restart: unless-stopped
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - odoo_net

  # ── Certbot (Let's Encrypt) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: odoo_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Runs once to obtain cert, then exits. Use certbot-renew.sh for renewal.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - odoo_net

  # ── Health Monitor Sidecar ────────────────────────────────────────────
  healthcheck:
    image: python:3.12-slim
    container_name: odoo_healthcheck
    restart: unless-stopped
    depends_on:
      - odoo
    volumes:
      - /opt/ai_employee_vault:/vault
      - ./healthcheck.py:/healthcheck.py:ro
    environment:
      VAULT_PATH: /vault
      ODOO_URL: http://odoo:8069
    command: python /healthcheck.py
    networks:
      - odoo_net

volumes:
  odoo_db_data:
  odoo_data:
  certbot_webroot:
  certbot_certs:

networks:
  odoo_net:
    driver: bridge
