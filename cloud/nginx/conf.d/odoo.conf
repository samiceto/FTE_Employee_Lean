# HTTP → redirect to HTTPS (after cert obtained)
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;  # Replace with your Azure VM DNS / domain

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Odoo reverse proxy
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;  # Replace with your Azure VM DNS / domain

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_OR_IP/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_OR_IP/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Max upload size for Odoo attachments
    client_max_body_size 64m;

    # Timeouts for long Odoo requests
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Odoo web
    location / {
        proxy_pass http://odoo:8069;
        proxy_redirect off;
    }

    # Odoo long-polling
    location /longpolling {
        proxy_pass http://odoo:8072;
    }

    # Static files cache
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        proxy_pass http://odoo:8069;
    }

    # Block direct DB manager access from outside
    location /web/database/ {
        deny all;
        return 403;
    }
}
